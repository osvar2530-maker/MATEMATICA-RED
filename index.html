<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatemÃticas de mi entorno</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #2E7D32, #81C784);
    text-align:center;
    margin:0;
    padding:20px;
    color:white;
}
.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    max-width:700px;
    margin:auto;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}
button{
    padding:10px 15px;
    margin:8px;
    border:none;
    border-radius:10px;
    background:#2E7D32;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#1B5E20;
}
.hidden{display:none;}
.star{
    font-size:30px;
    color:gold;
}
.progress{
    width:100%;
    background:#ddd;
    border-radius:10px;
    margin-bottom:15px;
}
.progress-bar{
    height:15px;
    width:0%;
    background:#2E7D32;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>?? Matematicas de mi entorno ??</h1>

<div class="container">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="inicio">
<h2>ÀBienvenido!</h2>
<p>Resuelve los problemas y gana estrellas ?</p>
<button onclick="startGame()">Comenzar</button>
</div>

<div id="quiz" class="hidden">
<h2 id="questionTitle"></h2>
<p id="questionText"></p>
<div id="options"></div>
<p id="feedback"></p>
</div>

<div id="resultado" class="hidden">
<h2>Resultado Final</h2>
<p id="puntaje"></p>
<div id="estrellas"></div>
<button onclick="restart()">Volver a jugar</button>
</div>

</div>

<script>

let questions = [
{
title:"Pregunta 1",
text:"Juan vendio 25 platanos el lunes y 18 el martes. ¢Cuantos vendio en total?",
options:["43","7","53"],
correct:0
},
{
title:"Pregunta 2",
text:"¢Que operacion usamos cuando juntamos cantidades?",
options:["Suma","Resta","Divisiµn"],
correct:0
},
{
title:"Pregunta 3",
text:"Juan tenÚa 70 mangos. Vendio 30 en la maþana y 20 en la tarde. ¢Cuantos le quedaron?",
options:["20","50","30"],
correct:0
},
{
title:"Pregunta 4",
text:"En una finca hay 125 gallinas. Si 48 se venden en el mercado y 27 se regalan, ¢cuantas quedan?",
options:["50","75","60"],
correct:1
},
{
title:"Pregunta 5",
text:"Un agricultor cosecho 36 sacos de maiz el lunes y el doble el martes. ¢Cuantos sacos cosecho en total?",
options:["108","72","96"],
correct:0
},
{
title:"Pregunta 6",
text:"En el bus escolar viajan 28 estudiantes. En la primera parada bajan 9 y suben 5. ¢Cuantos estudiantes quedan en el bus?",
options:["24","22","20"],
correct:0
}
];

let currentQuestion = 0;
let score = 0;

function startGame(){
document.getElementById("inicio").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
let q = questions[currentQuestion];
document.getElementById("questionTitle").innerHTML = q.title;
document.getElementById("questionText").innerHTML = q.text;

let optionsHTML = "";
q.options.forEach((option,index)=>{
optionsHTML += `<button onclick="checkAnswer(${index})">${option}</button>`;
});
document.getElementById("options").innerHTML = optionsHTML;
document.getElementById("feedback").innerHTML="";
updateProgress();
}

function checkAnswer(selected){
let q = questions[currentQuestion];

if(selected === q.correct){
score++;
document.getElementById("feedback").innerHTML="? ÀCorrecto! Excelente razonamiento.";
}else{
document.getElementById("feedback").innerHTML="? Respuesta incorrecta. Analiza los datos nuevamente.";
}

setTimeout(()=>{
currentQuestion++;
if(currentQuestion < questions.length){
showQuestion();
}else{
showResult();
}
},1500);
}

function updateProgress(){
let progress = ((currentQuestion)/questions.length)*100;
document.getElementById("progressBar").style.width = progress + "%";
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultado").classList.remove("hidden");

document.getElementById("puntaje").innerHTML = 
"Obtuviste " + score + " de " + questions.length + " puntos.";

let estrellas="";
if(score <=2){
estrellas="?";
}else if(score <=4){
estrellas="??";
}else{
estrellas="???";
}

document.getElementById("estrellas").innerHTML=estrellas;
}

function restart(){
location.reload();
}

</script>

</body>
</html>
